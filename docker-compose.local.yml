services:
  postgres:
    image: postgres:16-alpine
    container_name: infinite-canvas-postgres-local
    environment:
      POSTGRES_DB: infinite_canvas
      POSTGRES_USER: infinite_canvas
      POSTGRES_PASSWORD: infinite_canvas
      TZ: Asia/Shanghai
    command: ["postgres", "-c", "timezone=Asia/Shanghai", "-c", "log_timezone=Asia/Shanghai"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  server:
    image: infinite-canvas:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://infinite_canvas:infinite_canvas@postgres:5432/infinite_canvas
      TZ: Asia/Shanghai
      SESSION_SECRET: change-me-use-openssl-rand-base64-32
      UPLOAD_DIR: /data/uploads
    volumes:
      - ./data/uploads:/data/uploads
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    restart: unless-stopped
