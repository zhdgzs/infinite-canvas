name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          version=$(tr -d '[:space:]' < VERSION)
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid VERSION: $version" >&2
            exit 1
          fi
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - name: Check release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --generate-notes --title "$TAG"

      - name: Publish release artifacts
        if: steps.release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh workflow run docker-image.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f tag="$TAG"
          gh workflow run docs-docker-image.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f tag="$TAG"
          gh workflow run github-pages.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG"

      - name: Skip existing release
        if: steps.release.outputs.exists == 'true'
        run: echo "${{ steps.version.outputs.tag }} already exists, skipping release."
